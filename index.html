<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CS Fantasy NES Prototype</title>
    <link rel="stylesheet" href="styles.css?v=20260424-1045">
  </head>
  <body>
    <main class="game-shell" aria-label="CS Fantasy prototype">
      <section class="nes-screen" aria-live="polite">
        <header class="screen-header">
          <span>CS Fantasy</span>
          <span id="screen-title">WORLD</span>
        </header>

        <section class="field">
          <div class="world-view" id="world-view"></div>

          <div class="battle-view hidden" id="battle-view">
            <div class="enemy-field" id="enemy-field">
              <div class="enemy-line" id="enemy-line"></div>
            </div>
            <div class="party-column">
              <div class="party-row active" id="hero-row">
                <div class="tiny-sprite party-sprite" id="hero-sprite" aria-label="Rune sprite"></div>
                <div>
                  <strong>RUNE</strong>
                  <span>SP.CODE</span>
                </div>
              </div>
              <div class="party-row muted" id="knight-row">
                <div class="tiny-sprite party-sprite" id="knight-sprite" aria-label="Knight sprite"></div>
                <div>
                  <strong>BRAM</strong>
                  <span>KNIGHT</span>
                </div>
              </div>
              <div class="party-row muted" id="mage-row">
                <div class="tiny-sprite party-sprite" id="mage-sprite" aria-label="Mage sprite"></div>
                <div>
                  <strong>ADA</strong>
                  <span>MAGE</span>
                </div>
              </div>
              <div class="party-row muted" id="ranger-row">
                <div class="tiny-sprite party-sprite" id="ranger-sprite" aria-label="Ranger sprite"></div>
                <div>
                  <strong>IORI</strong>
                  <span>RANGER</span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="blue-window message-window" id="message-window">
          <p id="dialogue-text"></p>
          <section class="question-card hidden" id="question-card" aria-live="polite">
            <p class="question-kind" id="question-kind">QUESTION</p>
            <p class="question-prompt" id="question-prompt"></p>
          </section>
        </section>

        <section class="lower-grid">
          <nav class="blue-window commands-window" aria-label="Commands">
            <p class="window-title" id="command-title">COMMAND</p>
            <div class="commands" id="commands"></div>
          </nav>
        </section>
        <section id="monaco-wrapper" class="blue-window hidden" style="flex: 1; flex-direction: column; overflow: hidden; margin-top: 12px; border-radius: 12px;">
          <header style="background: rgba(0,0,0,0.5); padding: 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;">
            <span style="color: var(--cyan); font-family: var(--font-title); font-size: 0.9rem; letter-spacing: 2px;">IDE SPELLCASTING</span>
            <button id="btn-run-code" style="background: var(--gold); color: #000; border: none; padding: 4px 12px; border-radius: 4px; font-weight: bold; cursor: pointer;">COMPILE (ENTER)</button>
          </header>
          <div id="monaco-container" style="flex: 1; min-height: 200px;"></div>
        </section>

      </section>
    </main>

    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
    <script>
      require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
      window.MonacoEnvironment = { getWorkerUrl: () => proxy };
      let proxy = URL.createObjectURL(new Blob([`
        self.MonacoEnvironment = {
          baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/'
        };
        importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/base/worker/workerMain.js');
      `], { type: 'text/javascript' }));
    </script>
    <script src="script.js?v=20260424-1045"></script>
  </body>
</html>
